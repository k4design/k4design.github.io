  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

c0; letter-spacing:.04em;\">{{ r.tag }}<\u002Fdiv>\n            <div style=\"font-family:'Sora',sans-serif; font-weight:600; font-size:23px; line-height:1.2; color:#F4F8FF; margin:16px 0 14px;\">{{ r.title }}<\u002Fdiv>\n            <p style=\"font-size:15px; line-height:1.65; color:#9aa7c0; margin:0;\">{{ r.body }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SOCIAL PROOF (filmstrip) -->\n    <section style=\"position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:40px 40px 90px;\">\n      <div style=\"display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom:30px;\">\n        <h2 style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:clamp(26px,3vw,38px); letter-spacing:-.02em; margin:0; color:#F4F8FF;\">Inside the experience.<\u002Fh2>\n        <span style=\"font-family:'Sora',sans-serif; font-size:13px; color:#67748f;\">Drag in photos from past events<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:12px;\">\n        <image-slot id=\"b-proof-1\" style=\"width:100%; height:280px;\" shape=\"rounded\" radius=\"16\" placeholder=\"Stage / keynote\"><\u002Fimage-slot>\n        <image-slot id=\"b-proof-2\" style=\"width:100%; height:280px;\" shape=\"rounded\" radius=\"16\" placeholder=\"Expo floor\"><\u002Fimage-slot>\n        <image-slot id=\"b-proof-3\" style=\"width:100%; height:280px;\" shape=\"rounded\" radius=\"16\" placeholder=\"Networking\"><\u002Fimage-slot>\n        <image-slot id=\"b-proof-4\" style=\"width:100%; height:280px;\" shape=\"rounded\" radius=\"16\" placeholder=\"VIP lounge\"><\u002Fimage-slot>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- TIERS (ladder) -->\n    <section id=\"tiers-b\" style=\"position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:40px 40px 40px;\">\n      <div style=\"text-align:center; margin-bottom:48px;\">\n        <div style=\"font-family:'Sora',sans-serif; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#5fd8c0;\">Sponsorship tiers<\u002Fdiv>\n        <h2 style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:clamp(30px,3.6vw,46px); line-height:1.1; letter-spacing:-.02em; margin:14px auto 0; color:#F4F8FF;\">Seven ways to partner.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:12px;\">\n        <sc-for list=\"{{ tiers }}\" as=\"t\" hint-placeholder-count=\"7\">\n          <div style=\"position:relative; border-radius:18px; border:1px solid {{ t.borderColor }}; background:{{ t.rowBg }}; overflow:hidden;\">\n            <div style=\"display:grid; grid-template-columns:300px 1fr 170px; gap:28px; align-items:center; padding:28px 32px;\">\n              <div>\n                <sc-if value=\"{{ t.featured }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:inline-block; padding:5px 11px; border-radius:999px; background:linear-gradient(120deg,#5BE0A8,#2BC4D4 50%,#4A8DF0); color:#051018; font-family:'Sora',sans-serif; font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; margin-bottom:12px;\">★ Presenting · Exclusive<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ t.notFeatured }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:inline-block; padding:5px 11px; border-radius:999px; font-family:'Sora',sans-serif; font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; margin-bottom:12px; color:{{ t.badgeColor }}; background:{{ t.badgeBg }}; border:{{ t.badgeBorder }};\">{{ t.badge }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"font-family:'Sora',sans-serif; font-weight:600; font-size:19px; color:#F4F8FF;\">{{ t.name }}<\u002Fdiv>\n                <div style=\"font-size:13px; color:#8fa0c0; line-height:1.4; margin-top:5px;\">{{ t.tagline }}<\u002Fdiv>\n                <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:30px; color:#F4F8FF; margin-top:14px; letter-spacing:-.01em;\">{{ t.price }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px 24px;\">\n                <sc-for list=\"{{ t.highlights }}\" as=\"h\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex; gap:10px; align-items:flex-start;\">\n                    <span style=\"flex:none; margin-top:6px; width:6px; height:6px; border-radius:50%; background:linear-gradient(120deg,#5BE0A8,#4A8DF0);\"><\u002Fspan>\n                    <span style=\"font-size:13.5px; line-height:1.4; color:#c4cfe2;\">{{ h }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <a href=\"#apply-b\" style=\"display:block; text-align:center; text-decoration:none; font-family:'Sora',sans-serif; font-size:14px; font-weight:600; color:{{ t.ctaColor }}; background:{{ t.ctaBg }}; border:{{ t.ctaBorder }}; padding:13px 18px; border-radius:11px;\">Apply to reserve<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- COMPARISON -->\n    <section id=\"compare-b\" style=\"position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:90px 40px 50px;\">\n      <div style=\"text-align:center; margin-bottom:40px;\">\n        <div style=\"font-family:'Sora',sans-serif; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#5fd8c0;\">Compare benefits<\u002Fdiv>\n        <h2 style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:clamp(30px,3.6vw,46px); line-height:1.1; letter-spacing:-.02em; margin:14px auto 0; color:#F4F8FF;\">Everything, side by side.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"overflow:hidden; border-radius:16px; border:1px solid rgba(255,255,255,.1);\">\n        <div data-m=\"trow\" style=\"display:grid; grid-template-columns:1.7fr repeat(7,1fr); background:rgba(255,255,255,.035); border-bottom:1px solid rgba(255,255,255,.1);\">\n          <div style=\"padding:16px 22px; font-family:'Sora',sans-serif; font-size:12.5px; font-weight:600; color:#8fa0c0;\">Benefit<\u002Fdiv>\n          <sc-for list=\"{{ shortNames }}\" as=\"n\" hint-placeholder-count=\"7\">\n            <div style=\"padding:16px 8px; text-align:center; font-family:'Sora',sans-serif; font-size:12px; font-weight:600; color:#cdd8ec; border-left:1px solid rgba(255,255,255,.06);\">{{ n }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-for list=\"{{ compareRows }}\" as=\"row\" hint-placeholder-count=\"11\">\n          <div data-m=\"trow\" style=\"display:grid; grid-template-columns:1.7fr repeat(7,1fr); border-bottom:1px solid rgba(255,255,255,.055);\">\n            <div style=\"padding:14px 22px; font-size:13.5px; color:#c4cfe2;\">{{ row.label }}<\u002Fdiv>\n            <div style=\"padding:14px 6px; text-align:center; border-left:1px solid rgba(255,255,255,.045); display:flex; align-items:center; justify-content:center;\"><sc-if value=\"{{ row.c0.on }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-family:'Sora',sans-serif; font-size:12px; font-weight:600; color:#7fe9cf;\">{{ row.c0.t }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ row.c0.off }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#3f4a63; font-size:14px;\">—<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n            <div style=\"padding:14px 6px; text-align:center; border-left:1px solid rgba(255,255,255,.045); display:flex; align-items:center; justify-content:center;\"><sc-if value=\"{{ row.c1.on }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-family:'Sora',sans-serif; font-size:12px; font-weight:600; color:#7fe9cf;\">{{ row.c1.t }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ row.c1.off }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#3f4a63; font-size:14px;\">—<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n            <div style=\"padding:14px 6px; text-align:center; border-left:1px solid rgba(255,255,255,.045); display:flex; align-items:center; justify-content:center;\"><sc-if value=\"{{ row.c2.on }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-family:'Sora',sans-serif; font-size:12px; font-weight:600; color:#7fe9cf;\">{{ row.c2.t }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ row.c2.off }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#3f4a63; font-size:14px;\">—<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n            <div style=\"padding:14px 6px; text-align:center; border-left:1px solid rgba(255,255,255,.045); display:flex; align-items:center; justify-content:center;\"><sc-if value=\"{{ row.c3.on }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-family:'Sora',sans-serif; font-size:12px; font-weight:600; color:#7fe9cf;\">{{ row.c3.t }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ row.c3.off }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#3f4a63; font-size:14px;\">—<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n            <div style=\"padding:14px 6px; text-align:center; border-left:1px solid rgba(255,255,255,.045); display:flex; align-items:center; justify-content:center;\"><sc-if value=\"{{ row.c4.on }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-family:'Sora',sans-serif; font-size:12px; font-weight:600; color:#7fe9cf;\">{{ row.c4.t }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ row.c4.off }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#3f4a63; font-size:14px;\">—<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n            <div style=\"padding:14px 6px; text-align:center; border-left:1px solid rgba(255,255,255,.045); display:flex; align-items:center; justify-content:center;\"><sc-if value=\"{{ row.c5.on }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-family:'Sora',sans-serif; font-size:12px; font-weight:600; color:#7fe9cf;\">{{ row.c5.t }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ row.c5.off }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#3f4a63; font-size:14px;\">—<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n            <div style=\"padding:14px 6px; text-align:center; border-left:1px solid rgba(255,255,255,.045); display:flex; align-items:center; justify-content:center;\"><sc-if value=\"{{ row.c6.on }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-family:'Sora',sans-serif; font-size:12px; font-weight:600; color:#7fe9cf;\">{{ row.c6.t }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ row.c6.off }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#3f4a63; font-size:14px;\">—<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p style=\"font-size:13px; color:#67748f; margin:16px 2px 0; text-align:center;\">Silver sponsors and above may choose their booth location. Benefits subject to availability.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- FINAL CTA -->\n    <section id=\"apply-b\" style=\"position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:70px 40px 120px;\">\n      <div style=\"position:relative; border-radius:24px; overflow:hidden; border:1px solid rgba(255,255,255,.1); background:linear-gradient(135deg,#0a1424,#0b1830); padding:64px 56px; display:grid; grid-template-columns:1.4fr auto; gap:40px; align-items:center;\">\n        <div style=\"position:absolute; inset:0; pointer-events:none; background:radial-gradient(520px 300px at 12% 0%, rgba(43,196,212,.2), transparent 60%);\"><\u002Fdiv>\n        <div style=\"position:relative;\">\n          <h2 style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:clamp(30px,3.6vw,48px); line-height:1.08; letter-spacing:-.02em; color:#F4F8FF; margin:0;\">Let's get your brand on the schedule.<\u002Fh2>\n          <p style=\"font-size:17px; line-height:1.6; color:#a6b2cb; max-width:520px; margin:18px 0 0;\">Tiers are limited and assigned first-come. Submit your application and our partnerships team will confirm placement.<\u002Fp>\n        <\u002Fdiv>\n        <a href=\"#apply-b\" style=\"position:relative; display:inline-block; white-space:nowrap; text-decoration:none; font-family:'Sora',sans-serif; font-size:16px; font-weight:600; color:#051018; background:linear-gradient(120deg,#5BE0A8,#2BC4D4 50%,#4A8DF0); padding:18px 36px; border-radius:14px; box-shadow:0 12px 36px rgba(43,196,212,.4);\">Apply to reserve →<\u002Fa>\n      <\u002Fdiv>\n      <footer style=\"display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; margin-top:44px; padding-top:26px; border-top:1px solid rgba(255,255,255,.08);\">\n        <span style=\"font-family:'Sora',sans-serif; font-size:13px; color:#67748f;\">Ascend Agent Expo · LPT Realty<\u002Fspan>\n        <span style=\"font-size:13px; color:#67748f;\">Sponsorship Prospectus 2026<\u002Fspan>\n      <\u002Ffooter>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { dir: 'A', modalOpen: false };\n\n  renderVals() {\n    const grad = 'linear-gradient(120deg,#5BE0A8,#2BC4D4 50%,#4A8DF0)';\n    const tiers = [\n      { name: 'Presenting Sponsor', price: '$250,000', tagline: 'Maximum brand visibility & industry leadership', featured: true,\n        highlights: ['40-min Expo Stage keynote presentation', '10-min Main Stage Fireside Chat with RP', 'Largest 20\\u2032\\u00d720\\u2032 exhibit footprint', 'Premier logo placement across all event media'] },\n      { name: 'VIP Sponsor', price: '$75,000', tagline: 'Premium access to decision makers', featured: false,\n        highlights: ['30-min Expo Stage presentation', 'Welcome Toast at the VIP Dinner', '20\\u2032\\u00d720\\u2032 exhibit booth', '4 VIP Dinner seats & lounge passes'] },\n      { name: 'Gold Sponsor', price: '$25,000', tagline: 'Thought leadership & meaningful engagement', featured: false,\n        highlights: ['20-min Expo Stage presentation', '20\\u2032\\u00d720\\u2032 exhibit booth', '2 VIP Dinner seats', 'Attendee passport program'] },\n      { name: 'Silver Sponsor', price: '$15,000', tagline: 'Strong brand presence & lead generation', featured: false,\n        highlights: ['10-min Expo Stage presentation', '10\\u2032\\u00d720\\u2032 exhibit booth', 'Choose your booth location', '1 VIP Dinner seat'] },\n      { name: 'Bronze Sponsor', price: '$10,000', tagline: 'Consistent visibility throughout the event', featured: false,\n        highlights: ['10\\u2032\\u00d710\\u2032 exhibit booth', 'Welcome bag inclusion', 'Website & signage recognition', 'Post-event acknowledgements'] },\n      { name: 'Exhibitor', price: '$5,000', tagline: 'Affordable access to attendees', featured: false,\n        highlights: ['10\\u2032\\u00d710\\u2032 exhibit booth', 'Sponsor roll inclusion', 'Printed signage recognition', 'Website recognition'] },\n      { name: 'LPT Agent Partner', price: '$1,000', tagline: 'Support the community & increase visibility', featured: false,\n        highlights: ['10\\u2032\\u00d710\\u2032 exhibit booth', 'Logo on recognition page', 'Sponsor roll recognition', 'Post-event thank-you'] },\n    ];\n\n    const reasons = [\n      { tag: 'Reach', title: 'The decision-makers', body: 'Top-producing agents, team leaders, and operators \\u2014 the buyers who shape where the industry spends. Sponsorship puts you in front of them all weekend.' },\n      { tag: 'Own', title: 'The stage & the floor', body: 'From keynote presentations to a prime exhibit footprint, higher tiers give you the microphone and the foot traffic to make a lasting impression.' },\n      { tag: 'Build', title: 'Real relationships', body: 'VIP dinners, lounges, and Team Leader lunches create the unhurried, high-trust settings where partnerships actually start.' },\n    ];\n\n    const ladder = tiers.map(t => ({ name: t.name.replace(' Sponsor','').replace('LPT ',''), price: t.price }));\n    const shortNames = ['Presenting', 'VIP', 'Gold', 'Silver', 'Bronze', 'Exhibitor', 'Agent'];\n\n    const rawRows = [\n      ['Expo Stage presentation', '40 min', '30 min', '20 min', '10 min', '\\u2014', '\\u2014', '\\u2014'],\n      ['Main Stage Fireside Chat', '\\u2713', '\\u2014', '\\u2014', '\\u2014', '\\u2014', '\\u2014', '\\u2014'],\n      ['Breakout session', 'Exclusive', '\\u2713', '\\u2014', '\\u2014', '\\u2014', '\\u2014', '\\u2014'],\n      ['Exhibit footprint', \"20\\u2032\\u00d720\\u2032\", \"20\\u2032\\u00d720\\u2032\", \"20\\u2032\\u00d720\\u2032\", \"10\\u2032\\u00d720\\u2032\", \"10\\u2032\\u00d710\\u2032\", \"10\\u2032\\u00d710\\u2032\", \"10\\u2032\\u00d710\\u2032\"],\n      ['VIP Dinner seats', '6', '4', '2', '1', '\\u2014', '\\u2014', '\\u2014'],\n      ['VIP Lounge passes', '6', '4', '2', '1', '\\u2014', '\\u2014', '\\u2014'],\n      ['VIP Lounge table', '\\u2713', '\\u2713', '\\u2713', '\\u2014', '\\u2014', '\\u2014', '\\u2014'],\n      ['Attendee passport program', '\\u2713', '\\u2713', '\\u2713', '\\u2713', '\\u2014', '\\u2014', '\\u2014'],\n      ['Welcome bag inclusion', '\\u2713', '\\u2713', '\\u2713', '\\u2713', '\\u2713', '\\u2014', '\\u2014'],\n      ['Team Leader Lunch', '\\u2713', '\\u2713', '\\u2713', '\\u2713', '\\u2014', '\\u2014', '\\u2014'],\n      ['Choose booth location', '\\u2713', '\\u2713', '\\u2713', '\\u2713', '\\u2014', '\\u2014', '\\u2014'],\n      ['Logo & signage recognition', 'Premier', 'Prominent', '\\u2713', '\\u2713', '\\u2713', '\\u2713', '\\u2713'],\n    ];\n    const compareRows = rawRows.map(r => {\n      const o = { label: r[0] };\n      for (let i = 0; i < 7; i++) {\n        const v = r[i + 1];\n        o['c' + i] = { t: v, on: v !== '\\u2014', off: v === '\\u2014' };\n      }\n      return o;\n    });\n\n    const proofPoints = [\n      { k: 'Keynote stage', v: 'Up to 40 minutes on the Expo Stage' },\n      { k: 'Prime exhibit', v: 'Footprints up to 20\\u2032\\u00d720\\u2032' },\n      { k: 'VIP access', v: 'Dinners, lounges & Team Leader lunch' },\n      { k: 'Year-round recognition', v: 'Pre- and post-event visibility' },\n    ];\n\n    const badges = {\n      'Presenting Sponsor': { l: 'Exclusive · 1 partner', c: '#051018', bg: grad, bd: '0' },\n      'VIP Sponsor':        { l: 'Premium access',     c: '#5FE9CF', bg: 'rgba(52,224,192,.12)',  bd: '1px solid rgba(52,224,192,.42)' },\n      'Gold Sponsor':       { l: 'Thought leadership', c: '#F2C76B', bg: 'rgba(242,199,107,.12)', bd: '1px solid rgba(242,199,107,.42)' },\n      'Silver Sponsor':     { l: 'Lead generation',    c: '#CBD5E6', bg: 'rgba(203,213,230,.12)', bd: '1px solid rgba(203,213,230,.36)' },\n      'Bronze Sponsor':     { l: 'Brand visibility',   c: '#E0A878', bg: 'rgba(214,154,106,.13)', bd: '1px solid rgba(214,154,106,.42)' },\n      'Exhibitor':          { l: 'Floor presence',     c: '#9CC2EE', bg: 'rgba(143,184,232,.12)', bd: '1px solid rgba(143,184,232,.36)' },\n      'LPT Agent Partner':  { l: 'Community',          c: '#B3BEFF', bg: 'rgba(169,182,255,.12)', bd: '1px solid rgba(169,182,255,.38)' },\n    };\n    tiers.forEach(t => {\n      const b = badges[t.name] || { l: '', c: '#9aa7c0', bg: 'rgba(255,255,255,.06)', bd: '1px solid rgba(255,255,255,.14)' };\n      t.badge = b.l; t.badgeColor = b.c; t.badgeBg = b.bg; t.badgeBorder = b.bd;\n      t.notFeatured = !t.featured;\n      t.borderColor = t.featured ? 'rgba(43,196,212,.5)' : 'rgba(255,255,255,.09)';\n      t.rowBg = t.featured\n        ? 'linear-gradient(120deg,rgba(43,196,212,.10),rgba(74,141,240,.06))'\n        : 'rgba(255,255,255,.025)';\n      t.ctaBg = t.featured ? 'linear-gradient(120deg,#5BE0A8,#2BC4D4 50%,#4A8DF0)' : 'rgba(255,255,255,.05)';\n      t.ctaColor = t.featured ? '#051018' : '#E8EEF7';\n      t.ctaBorder = t.featured ? '0' : '1px solid rgba(255,255,255,.16)';\n    });\n\n    const isA = this.state.dir === 'A';\n    return {\n      grad,\n      proofPoints,\n      tiers,\n      featured: tiers.find(t => t.featured),\n      rest: tiers.filter(t => !t.featured),\n      reasons, ladder, shortNames, compareRows,\n      isA, isB: !isA,\n      setA: () => this.setState({ dir: 'A' }),\n      setB: () => this.setState({ dir: 'B' }),\n      modalOpen: this.state.modalOpen,\n      openModal: () => this.setState({ modalOpen: true }),\n      closeModal: () => this.setState({ modalOpen: false }),\n      aBg: isA ? 'linear-gradient(120deg,#5BE0A8,#2BC4D4 50%,#4A8DF0)' : 'transparent',\n      aColor: isA ? '#051018' : '#aab6cf',\n      bBg: !isA ? 'linear-gradient(120deg,#5BE0A8,#2BC4D4 50%,#4A8DF0)' : 'transparent',\n      bColor: !isA ? '#051018' : '#aab6cf',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
