name = "apertureintake"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Image bytes (originals + thumbnails).
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "apertureintake"

# Project + photo metadata.
[[d1_databases]]
binding = "DB"
database_name = "apertureintake"
database_id = "365d87c0-1483-4406-8985-8a0d30efc696"

[vars]
# Locked to your GitHub Pages site (the app that calls this Worker).
ALLOWED_ORIGIN = "https://k4design.github.io"
# "true" rejects requests without a Cloudflare Access identity (see README).
REQUIRE_AUTH = "false"

# ANTHROPIC_API_KEY is a SECRET, not a var — only needed for AI photo tagging:
#   wrangler secret put ANTHROPIC_API_KEY
