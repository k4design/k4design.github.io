name = "dezzy-intake"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Image bytes (originals + thumbnails).
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "dezzy-intake-photos"

# Project + photo metadata.
[[d1_databases]]
binding = "DB"
database_name = "dezzy-intake"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[vars]
# Lock this to your site origin in production, e.g. "https://k4design.github.io".
ALLOWED_ORIGIN = "*"
# "true" rejects requests without a Cloudflare Access identity (see README).
REQUIRE_AUTH = "false"

# ANTHROPIC_API_KEY is a SECRET, not a var — only needed for AI photo tagging:
#   wrangler secret put ANTHROPIC_API_KEY
