<!-- HTML Snippet for Lofty.com - Deloitte Fast 500 Award Section -->
<section id="deloitte-award" class="deloitte-award">
  <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap');
        /* Scoped styles for Lofty Deloitte Award Section */
        #deloitte-award {
            height: auto;
            min-height: 20vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #12141b;
            padding: 10vh 0 0 0;
            overflow: hidden;
            position: relative;
          z-index:1;
        }
        
        #deloitte-award .award-container {
            width: 95vw;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            text-align: left;
            position: relative;
            z-index: 2;
            gap: 3rem;
        }
        
        #deloitte-award .award-image {
            flex-shrink: 0;
            height: 5.25vh;
            width: auto;
            object-fit: contain;
        }
        
        #deloitte-award .award-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            gap: 0.75rem;
            flex: 1;
        }
        
      #deloitte-award .award-headline {
          font-family: 'Poppins', sans-serif;
          font-size: 16px;
          font-weight: 300;
          color: #ffffff;
          line-height: 1.3;
          margin: 0;
          letter-spacing: -0.02em;
          word-wrap: break-word;
          hyphens: auto;
          max-width: 100%;
      }
        
        #deloitte-award .award-headline .highlight {
            color: #0092ff;
            font-weight: 400;
        }
        
        #deloitte-award .award-description {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 1.25rem;
            font-weight: 200;
            color: #ffffff;
            line-height: 1;
            margin: 0;
            letter-spacing: 0.01em;
          max-width:75%;
        }
        
        #deloitte-award .decorative-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(0, 146, 255, 0.3) 20%,
                rgba(0, 146, 255, 0.6) 50%,
                rgba(0, 146, 255, 0.3) 80%,
                transparent 100%
            );
        }
        
        /* Responsive Design */
        
        @media (max-width: 1024px) {
            #deloitte-award {
                height: 20vh;
                min-height: 20vh;
            }
            
            #deloitte-award .award-container {
                padding: 0 3rem;
                gap: 2rem;
            }
            
            #deloitte-award .award-image {
                height: 5.25vh;
            }
        }
        
      @media (max-width: 768px) {
          #deloitte-award {
              height: auto;
              min-height: auto;
              padding: 5vh 0 3rem 0;
              background: #12141b;;
          }

          #deloitte-award .award-container {
              flex-direction: column;
              align-items: flex-start;
              text-align: left;
              padding: 0 2rem;
              gap: 0;
          }

          #deloitte-award .award-image {
              height: auto;
              width: 40vw;
              max-width: 40vw;
              object-fit: contain;
              order: 1;
              margin-top: 6vh;
          }

          #deloitte-award .award-content {
              align-items: flex-start;
              gap: 1rem;
              order: 2;
          }

          #deloitte-award .award-headline {
              font-size: 14px;
              text-align: left;
          }
          
          #deloitte-award .award-description {
              text-align: left;
              max-width: 100%;
          }
      }
        
      @media (max-width: 480px) {
          #deloitte-award {
              height: auto;
              min-height: auto;
              padding: 5vh 0 2.5rem 0;
              background: #12141b;;
          }

          #deloitte-award .award-container {
              flex-direction: column;
              align-items: flex-start;
              text-align: left;
              padding: 0 1.5rem;
              gap: 0;
          }

          #deloitte-award .award-image {
              height: auto;
              width: 40vw;
              max-width: 40vw;
              object-fit: contain;
              order: 1;
              margin-top: 6vh;
          }

          #deloitte-award .award-content {
              align-items: flex-start;
              gap: 0.75rem;
              order: 2;
          }

          #deloitte-award .award-headline {
              font-size: 14px;
              text-align: left;
          }
          
          #deloitte-award .award-description {
              font-size: .75rem;
              text-align: left;
              max-width: 100%;
          }
      }
        </style>
  <div class="award-container">
    <img src="https://k4design.github.io/lofty-sections/img/deloitte_fast500.png" alt="Deloitte Fast 500" class="award-image" />
    <div class="award-content">
      <h2 class="award-headline">Aperture Global has been recognized as one of North America's fastest-growing technology companies, ranking <span class="highlight">#2</span> in the 2025 Deloitte Fast 500 as it continues to lead innovation in luxury real estate technology.</h2>
    </div>
  </div>
  <div class="decorative-line"></div>
</section>
