<script type="text/babel">
const { useState: usePHState, useEffect: usePHEffect, useRef: usePHRef } = React;

function pickPhoto(label = '') {
  const l = String(label).toLowerCase();
  for (const entry of PHOTO_LIBRARY) {
    if (entry.keys.some(k => l.includes(k))) return entry.url;
  }
  return 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1600&q=80';

function Photo({ label, variant = 'dark', style = {}, className = '' }) {

function Countdown() {
  const TARGET = new Date('2026-07-13T00:00:00');
  const calc = () => {
    const diff = TARGET - Date.now();
    if (diff <= 0) return { d: 0, h: 0, m: 0, s: 0 };
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    return { d, h, m, s };
  };
  const [t, setT] = useStateS(calc);
  useEffectS(() => {
    const id = setInterval(() => setT(calc()), 1000);
    return () => clearInterval(id);
  }, []);
  const pad = n => String(n).padStart(2, '0');
  return (
    <div className="stat countdown-stat">
      <div className="n countdown-n">
        <em>{t.d}</em><span className="cd-sep">d</span>
        <em>{pad(t.h)}</em><span className="cd-sep">h</span>
        <em>{pad(t.m)}</em><span className="cd-sep">m</span>
        <em>{pad(t.s)}</em><span className="cd-sep">s</span>
      </div>
      <div className="l">Until arrival day &mdash; Jul 13, 2026</div>
    </div>
  );
}

<script type="text/babel">
const { useState: useStateT, useEffect: useEffectT } = React;

const TWEAK_DEFAULTS = { accent: 'gold', heroLine: 'italic', density: 'airy' };

const ACCENTS = {
  gold:  { g1: '#B08D3F', g2: '#C9A75A' },
  ember: { g1: '#B85A2E', g2: '#D07744' },
  sage:  { g1: '#7A8A5B', g2: '#9AAA78' },
  bone:  { g1: '#C5B79A', g2: '#DCD0B6' },
};

function applyTweaks(t) {
  const root = document.documentElement;
  const a = ACCENTS[t.accent] || ACCENTS.gold;
  root.style.setProperty('--gold', a.g1);
  root.style.setProperty('--gold-2', a.g2);
  if (t.density === 'dense') {
    root.style.setProperty('--pad-section', '84px');
  } else {
    root.style.setProperty('--pad-section', '140px');
  }
  document.querySelectorAll('.hero-title .line-1').forEach(el => {
    el.style.fontStyle = t.heroLine === 'italic' ? 'italic' : 'normal';
  });
}

function TweaksPanel({ open, onClose }) {
  const [t, setT] = useStateT(() => {
    try { return { ...TWEAK_DEFAULTS, ...(JSON.parse(localStorage.getItem('dbbs-tweaks') || '{}')) }; }
    catch { return { ...TWEAK_DEFAULTS }; }
  });

  useEffectT(() => {
    applyTweaks(t);
    localStorage.setItem('dbbs-tweaks', JSON.stringify(t));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: t }, '*');
  }, [t]);

  if (!open) return null;

  return (
    <div className="tweaks">
      <h6>
        <span>Tweaks &middot; Design</span>
        <span className="close" onClick={onClose}>&#10005;</span>
      </h6>
      <div className="tweak-row">
        <div className="label">Accent</div>
        <div className="opts">
          {Object.keys(ACCENTS).map(k => (
            <button key={k} className={`opt ${t.accent === k ? 'on' : ''}`} onClick={() => setT(s => ({ ...s, accent: k }))}>{k}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="label">Hero line 1</div>
        <div className="opts">
          {['italic', 'upright'].map(k => (
            <button key={k} className={`opt ${t.heroLine === k ? 'on' : ''}`} onClick={() => setT(s => ({ ...s, heroLine: k }))}>{k}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="label">Density</div>
        <div className="opts">
          {['airy', 'dense'].map(k => (
            <button key={k} className={`opt ${t.density === k ? 'on' : ''}`} onClick={() => setT(s => ({ ...s, density: k }))}>{k}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

window.TweaksPanel = TweaksPanel;
window.applyInitialTweaks = () => applyTweaks({ ...TWEAK_DEFAULTS, ...(JSON.parse(localStorage.getItem('dbbs-tweaks') || '{}') || {}) });
</script>

<script type="text/babel">
const { useState: useStateA, useEffect: useEffectA } = React;

function smoothScroll(id, duration = 1000) {
  const el = document.getElementById(id);
  if (!el) return;
  const startY = window.scrollY;
  const targetY = el.getBoundingClientRect().top + startY;
  const diff = targetY - startY;
  let start = null;
  const ease = t => t < 0.5 ? 4*t*t*t : (t-1)*(2*t-2)*(2*t-2)+1;
  function step(ts) {
    if (!start) start = ts;
    const p = Math.min((ts - start) / duration, 1);
    window.scrollTo(0, startY + diff * ease(p));
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
window.smoothScroll = smoothScroll;

function App() {
  const [scrolled, setScrolled] = useStateA(false);
  const [showCta, setShowCta] = useStateA(false);
  const [tweaksOpen, setTweaksOpen] = useStateA(false);

  useEffectA(() => {
    const onScroll = () => {
      const y = window.scrollY;
      setScrolled(y > 40);
      setShowCta(y > window.innerHeight * 0.6 && y < (document.body.scrollHeight - window.innerHeight - 600));
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  useEffectA(() => {
    const onMsg = (ev) => {
      const d = ev.data || {};
      if (d.type === '__activate_edit_mode') setTweaksOpen(true);
      if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    window.applyInitialTweaks && window.applyInitialTweaks();
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const goApply = () => smoothScroll('apply');
  const goRecap = () => smoothScroll('recap');

  return (
    <div>
      <window.Nav scrolled={scrolled} onApply={goApply} />
      <window.Hero onApply={goApply} onWatch={goRecap} />
      <window.Marquee />
      <window.Recap />
      <window.Intro />
      <window.Pillars />
      <window.Gallery />
      <window.Itinerary />
      <window.Lineup />
      <window.Testimonial />
      <window.ApplySection />
      <window.Footer />

      <div className={`sticky-cta ${showCta ? 'on' : ''}`}>
        <a href="#apply" onClick={(e) => { e.preventDefault(); goApply(); }}>Reserve Your Seat &middot; July 2026 &#8594;</a>
      </div>

      <window.TweaksPanel open={tweaksOpen} onClose={() => setTweaksOpen(false)} />
    </div>
  );
}

function mount() {
  if (!window.Nav || !window.Hero || !window.ApplySection || !window.TweaksPanel) {
    return setTimeout(mount, 40);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
mount();
</script>
